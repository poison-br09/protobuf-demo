syntax = "proto3";

option go_package = "./generated";

import "google/api/annotations.proto";

message Address {
  string street = 1;
  string city   = 2;
}

enum UserStatus {
  USER_STATUS_UNKNOWN = 0;
  USER_STATUS_ACTIVE = 1;
  USER_STATUS_INACTIVE = 2;
  USER_STATUS_BANNED = 3;
}

message User {
  reserved 3;
  reserved "email";

  int32           id      = 1;
  string          name    = 2;
  Address         address = 4;
  repeated string phones  = 5;
  int32           age     = 6;
  UserStatus      status  = 7;

  oneof contact {
    string email_contact = 8;
    string phone_contact = 9;
  }
}

message GetUserRequest {
  int32 id = 1;
}

message UploadSummary {
  int32  count   = 1;
  string message = 2;
}

message ServerReply {
  string message = 1;
}

service UserService {
  rpc GetUser (GetUserRequest) returns (User) {
    option (google.api.http) = {
      get: "/v1/users/{id}"
    };
  }

  rpc GetActivityLog (GetUserRequest) returns (stream User) {
    option (google.api.http) = {
      get: "/v1/users/{id}/activity"
    };
  }

  rpc UploadUsers (stream User) returns (UploadSummary) {
    option (google.api.http) = {
      post: "/v1/users/upload"
      body: "*"
    };
  }

  rpc Chat (stream User) returns (stream ServerReply) {
    option (google.api.http) = {
      post: "/v1/users/chat"
      body: "*"
    };
  }
}
