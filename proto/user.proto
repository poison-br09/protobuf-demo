syntax = "proto3";

option go_package = "./generated";

// Nested message

message Address {
	string street = 1;
	string city = 2;
}

message User {

  int32   id      = 1;
  string  name    = 2;
  string test = 3;
  Address address = 4;
  repeated string phones = 5;
  int32   age     = 6;
}

message GetUserRequest {
	int32 id = 1;
}

service UserService {
  rpc GetUser (GetUserRequest) returns (User);
  rpc GetActivityLog (GetUserRequest) returns (stream User);
}